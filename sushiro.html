<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>壽司郎計數機 🍣</title>
<style>
  body { font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; background-color: #f9f9f9; padding: 20px; max-width: 450px; margin: 0 auto; }
  h2 { text-align: center; color: #d32f2f; margin-bottom: 25px; }
  .section-title { font-size: 16px; color: #666; margin: 20px 0 10px 5px; font-weight: bold; border-left: 4px solid #d32f2f; padding-left: 8px; }
  .plate-row { display: flex; align-items: center; justify-content: space-between; background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  .plate-info { display: flex; align-items: center; gap: 12px; font-size: 18px; font-weight: bold; width: 130px; }
  .color-box { width: 24px; height: 24px; border-radius: 50%; border: 1px solid #ddd; }
  .red { background-color: #ff4d4d; }
  .silver { background-color: #e0e0e0; }
  .gold { background-color: #ffd700; }
  .black { background-color: #333333; }
  .controls { display: flex; align-items: center; gap: 15px; }
  button.qty-btn { width: 40px; height: 40px; font-size: 22px; border: none; border-radius: 8px; background-color: #f0f0f0; cursor: pointer; color: #333; font-weight: bold; touch-action: manipulation; }
  button.qty-btn:active { background-color: #ddd; }
  .qty { font-size: 20px; width: 30px; text-align: center; font-weight: bold; }
  
  /* 新增單點項目的設計 */
  .custom-add-row { display: flex; gap: 10px; margin-bottom: 15px; }
  .custom-input { flex-grow: 1; padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; }
  .add-btn { padding: 12px 20px; font-size: 16px; font-weight: bold; background-color: #4CAF50; color: white; border: none; border-radius: 8px; cursor: pointer; }
  .add-btn:active { background-color: #45a049; }
  .custom-list { list-style: none; padding: 0; margin: 0; }
  .custom-item { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 12px 15px; border-radius: 8px; margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); font-size: 16px; }
  .delete-btn { background-color: #ff4d4d; color: white; border: none; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 14px; }
  
  .result { background: #fff; padding: 20px; border-radius: 12px; margin-top: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  .result p { font-size: 18px; margin: 12px 0; display: flex; justify-content: space-between; color: #555; }
  .total { font-size: 26px !important; font-weight: bold; color: #d32f2f !important; border-top: 2px dashed #ddd; padding-top: 15px; margin-top: 15px !important;}
  .reset-btn { width: 100%; padding: 16px; margin-top: 25px; font-size: 18px; font-weight: bold; background-color: #d32f2f; color: white; border: none; border-radius: 12px; cursor: pointer; letter-spacing: 2px; margin-bottom: 30px;}
  .reset-btn:active { background-color: #b71c1c; }
</style>
</head>
<body>

<h2>🍣 香港壽司郎計數機</h2>

<div class="section-title">一般壽司碟</div>
<div class="plate-row">
  <div class="plate-info"><div class="color-box red"></div> 紅碟 ($12)</div>
  <div class="controls">
    <button class="qty-btn" onclick="updateQty('red', -1)">-</button>
    <span class="qty" id="qty-red">0</span>
    <button class="qty-btn" onclick="updateQty('red', 1)">+</button>
  </div>
</div>

<div class="plate-row">
  <div class="plate-info"><div class="color-box silver"></div> 銀碟 ($17)</div>
  <div class="controls">
    <button class="qty-btn" onclick="updateQty('silver', -1)">-</button>
    <span class="qty" id="qty-silver">0</span>
    <button class="qty-btn" onclick="updateQty('silver', 1)">+</button>
  </div>
</div>

<div class="plate-row">
  <div class="plate-info"><div class="color-box gold"></div> 金碟 ($22)</div>
  <div class="controls">
    <button class="qty-btn" onclick="updateQty('gold', -1)">-</button>
    <span class="qty" id="qty-gold">0</span>
    <button class="qty-btn" onclick="updateQty('gold', 1)">+</button>
  </div>
</div>

<div class="plate-row">
  <div class="plate-info"><div class="color-box black"></div> 黑碟 ($27)</div>
  <div class="controls">
    <button class="qty-btn" onclick="updateQty('black', -1)">-</button>
    <span class="qty" id="qty-black">0</span>
    <button class="qty-btn" onclick="updateQty('black', 1)">+</button>
  </div>
</div>

<div class="section-title">🍜 其他單點 (拉麵、甜品等)</div>
<div class="custom-add-row">
  <input type="number" id="custom-price-input" class="custom-input" placeholder="輸入價錢 (例如: 32)" min="0">
  <button class="add-btn" onclick="addCustomItem()">加入</button>
</div>
<ul class="custom-list" id="custom-list">
  </ul>

<div class="result">
  <p><span>小計 (未加一):</span> <span id="subtotal">$0.0</span></p>
  <p><span>加一服務費:</span> <span id="service-charge">$0.0</span></p>
  <p class="total"><span>總數:</span> <span id="total">$0.0</span></p>
</div>

<button class="reset-btn" onclick="reset()">重新計算</button>

<script>
  const prices = { red: 12, silver: 17, gold: 22, black: 27 };
  let counts = { red: 0, silver: 0, gold: 0, black: 0 };
  let customItems = []; // 用嚟儲存其他單點價錢嘅陣列

  function updateQty(color, change) {
    if (counts[color] + change >= 0) {
      counts[color] += change;
      document.getElementById(`qty-${color}`).innerText = counts[color];
      calculate();
    }
  }

  // 新增單點項目
  function addCustomItem() {
    const input = document.getElementById('custom-price-input');
    const price = parseFloat(input.value);
    
    if (!isNaN(price) && price > 0) {
      customItems.push(price); // 加入陣列
      input.value = ''; // 清空輸入框
      renderCustomList();
      calculate();
    }
  }

  // 刪除單點項目
  function removeCustomItem(index) {
    customItems.splice(index, 1); // 從陣列移除
    renderCustomList();
    calculate();
  }

  // 更新單點列表顯示
  function renderCustomList() {
    const listElement = document.getElementById('custom-list');
    listElement.innerHTML = ''; // 先清空列表
    
    customItems.forEach((price, index) => {
      const li = document.createElement('li');
      li.className = 'custom-item';
      li.innerHTML = `
        <span>🍽️ 單點項目: <strong>$${price}</strong></span>
        <button class="delete-btn" onclick="removeCustomItem(${index})">刪除</button>
      `;
      listElement.appendChild(li);
    });
  }

  function calculate() {
    let subtotal = 0;
    
    // 計算壽司碟總數
    for (let color in prices) {
      subtotal += counts[color] * prices[color];
    }
    
    // 計算單點項目總數
    let customTotal = customItems.reduce((sum, current) => sum + current, 0);
    subtotal += customTotal;

    let serviceCharge = subtotal * 0.1;
    let total = subtotal + serviceCharge;

    document.getElementById('subtotal').innerText = '$' + subtotal.toFixed(1);
    document.getElementById('service-charge').innerText = '$' + serviceCharge.toFixed(1);
    document.getElementById('total').innerText = '$' + total.toFixed(1);
  }

  function reset() {
    counts = { red: 0, silver: 0, gold: 0, black: 0 };
    customItems = []; // 清空單點項目
    ['red', 'silver', 'gold', 'black'].forEach(color => {
      document.getElementById(`qty-${color}`).innerText = '0';
    });
    document.getElementById('custom-price-input').value = '';
    renderCustomList();
    calculate();
  }
  
  // 㩒 Enter 鍵都可以加入單點項目
  document.getElementById("custom-price-input").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
      event.preventDefault();
      addCustomItem();
    }
  });
</script>

</body>
</html>
