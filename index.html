<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>壽司郎計數機🍣</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d32f2f">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body { font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; background-color: #f4f7f6; padding: 20px; max-width: 500px; margin: 0 auto; color: #333; }
  h2 { text-align: center; color: #d32f2f; margin-bottom: 20px; letter-spacing: 1px; }
  .section-title { font-size: 16px; color: #555; margin: 20px 0 10px 5px; font-weight: bold; border-left: 4px solid #d32f2f; padding-left: 8px; }
  .plate-row { display: flex; align-items: center; justify-content: space-between; background: #fff; padding: 12px 15px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
  .plate-info { display: flex; align-items: center; gap: 12px; font-size: 16px; font-weight: bold; width: 130px; }
  .color-box { width: 20px; height: 20px; border-radius: 50%; border: 1px solid #ddd; }
  .red { background-color: #ff4d4d; } .silver { background-color: #e0e0e0; } .gold { background-color: #ffd700; } .black { background-color: #333333; }
  .controls { display: flex; align-items: center; gap: 12px; }
  button.qty-btn { width: 36px; height: 36px; font-size: 20px; border: none; border-radius: 8px; background-color: #f0f0f0; cursor: pointer; font-weight: bold; }
  .qty { font-size: 18px; width: 24px; text-align: center; font-weight: bold; }
  .toggle-btn { width: 100%; padding: 12px; font-size: 15px; background-color: #fff; border: 2px dashed #d32f2f; color: #d32f2f; border-radius: 10px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
  .hidden { display: none !important; }
  .special-menu-content { background: #fff; padding: 15px; border-radius: 10px; border: 1px solid #eee; margin-bottom: 15px; }
  .quick-add-container { display: flex; gap: 8px; flex-wrap: wrap; }
  .quick-btn { padding: 8px 12px; font-size: 13px; background-color: #fff; border: 1px solid #d32f2f; color: #d32f2f; border-radius: 20px; cursor: pointer; font-weight: bold; }
  .custom-add-row { display: flex; gap: 10px; margin-bottom: 15px; }
  .custom-input { flex-grow: 1; padding: 10px; border: 1px solid #ccc; border-radius: 8px; }
  .add-btn { padding: 10px 18px; background-color: #4CAF50; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
  .custom-item { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 10px 15px; border-radius: 8px; margin-bottom: 8px; border-left: 3px solid #4CAF50; font-size: 14px; }
  .delete-btn { background-color: #ff4d4d; color: white; border: none; border-radius: 6px; padding: 5px 10px; cursor: pointer; }
  .chart-container { background: #fff; padding: 15px; border-radius: 12px; margin-top: 20px; height: 200px; }
  .result { background: #fff; padding: 20px; border-radius: 12px; margin-top: 20px; }
  .result p { display: flex; justify-content: space-between; margin: 10px 0; }
  .total { font-size: 24px !important; font-weight: bold; color: #d32f2f !important; border-top: 2px dashed #ddd; padding-top: 15px; }
  .reset-btn { width: 100%; padding: 15px; margin-top: 20px; font-size: 18px; font-weight: bold; background-color: #d32f2f; color: white; border: none; border-radius: 12px; cursor: pointer; margin-bottom: 30px; }
  .footer { text-align: center; font-size: 12px; color: #999; padding-bottom: 30px; }
</style>
</head>
<body>

<h2>🍣 壽司郎計數機</h2>

<div class="section-title">一般壽司碟</div>
<div id="plates-container"></div>

<div class="section-title">🌸 春祭期間限定 (3月)</div>
<button id="toggle-menu-btn" class="toggle-btn" onclick="toggleSpecialMenu()">展開春祭 Menu ▼</button>
<div id="special-menu-container" class="special-menu-content hidden">
  <div class="quick-add-container">
    <button class="quick-btn" onclick="addCustomItem('生三文魚4種盛合', 48)">🍣 生三文魚4種 ($48)</button>
    <button class="quick-btn" onclick="addCustomItem('天然赤蝦海苔包', 10)">🦐 天然赤蝦包 ($10)</button>
    <button class="quick-btn" onclick="addCustomItem('櫻鯛系列', 22)">🐟 櫻鯛 ($22)</button>
    <button class="quick-btn" onclick="addCustomItem('竹節蝦雙味', 22)">🍤 竹節蝦雙味 ($22)</button>
    <button class="quick-btn" onclick="addCustomItem('平政', 27)">🐟 平政 ($27)</button>
    <button class="quick-btn" onclick="addCustomItem('醬油漬櫻鯛', 22)">🍥 醬油漬櫻鯛 ($22)</button>
    <button class="quick-btn" onclick="addCustomItem('松露風味長鰭吞拿魚', 12)">🍄 松露吞拿魚 ($12)</button>
    <button class="quick-btn" onclick="addCustomItem('八爪魚天婦羅串', 22)">🐙 八爪魚串 ($22)</button>
    <button class="quick-btn" onclick="addCustomItem('炸劍魚配他他醬', 25)">🐟 炸劍魚 ($25)</button>
    <button class="quick-btn" onclick="addCustomItem('蜆肉茶碗蒸', 19)">🥚 蜆肉茶碗蒸 ($19)</button>
    <button class="quick-btn" onclick="addCustomItem('咖哩蜆肉烏冬', 34)">🍜 咖哩蜆肉烏冬 ($34)</button>
    <button class="quick-btn" onclick="addCustomItem('親手包雪糕大福', 27)">🍡 雪糕大福 ($27)</button>
  </div>
</div>

<div class="custom-add-row">
  <input type="number" id="custom-price-input" class="custom-input" placeholder="自訂價錢">
  <button class="add-btn" onclick="addCustomItem('自訂單點', null)">加入</button>
</div>
<ul id="custom-list" style="list-style:none; padding:0;"></ul>

<div class="chart-container"><canvas id="sushiChart"></canvas></div>

<div class="result">
  <p><span>小計 (未加一):</span> <span id="subtotal">$0</span></p>
  <p><span>加一 (四捨五入):</span> <span id="service-charge">$0</span></p>
  <p class="total"><span>總數:</span> <span id="total">$0</span></p>
</div>

<button class="reset-btn" onclick="reset()">重新計算</button>
<div class="footer">&copy; 2026 Curation by @ch._wong</div>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); });
  }

  const platesData = [
    { id: 'red', name: '紅碟', price: 12, color: '#ff4d4d' },
    { id: 'silver', name: '銀碟', price: 17, color: '#e0e0e0' },
    { id: 'gold', name: '金碟', price: 22, color: '#ffd700' },
    { id: 'black', name: '黑碟', price: 27, color: '#333333' }
  ];
  let counts = { red: 0, silver: 0, gold: 0, black: 0 };
  let customItems = [];
  let sushiChart;

  const platesContainer = document.getElementById('plates-container');
  platesData.forEach(plate => {
    platesContainer.innerHTML += `
      <div class="plate-row">
        <div class="plate-info"><div class="color-box ${plate.id}"></div> ${plate.name} ($${plate.price})</div>
        <div class="controls">
          <button class="qty-btn" onclick="updateQty('${plate.id}', -1)">-</button>
          <span class="qty" id="qty-${plate.id}">0</span>
          <button class="qty-btn" onclick="updateQty('${plate.id}', 1)">+</button>
        </div>
      </div>`;
  });

  function initChart() {
    const ctx = document.getElementById('sushiChart').getContext('2d');
    sushiChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['紅', '銀', '金', '黑', '單點'],
        datasets: [{ data: [0, 0, 0, 0, 0], backgroundColor: ['#ff4d4d', '#e0e0e0', '#ffd700', '#333333', '#4CAF50'] }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
    });
  }

  function toggleSpecialMenu() {
    const container = document.getElementById('special-menu-container');
    const btn = document.getElementById('toggle-menu-btn');
    container.classList.toggle('hidden');
    btn.innerText = container.classList.contains('hidden') ? '展開春祭 Menu ▼' : '收起春祭 Menu ▲';
  }

  function updateQty(color, change) {
    if (counts[color] + change >= 0) {
      counts[color] += change;
      document.getElementById(`qty-${color}`).innerText = counts[color];
      calculate();
    }
  }

  function addCustomItem(name, p) {
    const input = document.getElementById('custom-price-input');
    let price = p !== null ? p : parseFloat(input.value);
    if (!isNaN(price) && price > 0) {
      customItems.push({ name, price });
      if (p === null) input.value = '';
      renderList();
      calculate();
    }
  }

  function removeCustomItem(i) { customItems.splice(i, 1); renderList(); calculate(); }

  function renderList() {
    const list = document.getElementById('custom-list');
    list.innerHTML = '';
    customItems.forEach((item, i) => {
      list.innerHTML += `<li class="custom-item"><span>${item.name}: $${item.price}</span><button class="delete-btn" onclick="removeCustomItem(${i})">刪除</button></li>`;
    });
  }

  function calculate() {
    let sub = 0; let cData = [0, 0, 0, 0, 0];
    platesData.forEach((p, i) => { let cost = counts[p.id] * p.price; sub += cost; cData[i] = cost; });
    let cTotal = customItems.reduce((s, item) => s + item.price, 0);
    sub += cTotal; cData[4] = cTotal;
    let sc = Math.round(sub * 0.1);
    document.getElementById('subtotal').innerText = '$' + sub;
    document.getElementById('service-charge').innerText = '$' + sc;
    document.getElementById('total').innerText = '$' + (sub + sc);
    sushiChart.data.datasets[0].data = cData; sushiChart.update();
    localStorage.setItem('sushiro_counts', JSON.stringify(counts));
    localStorage.setItem('sushiro_customItems', JSON.stringify(customItems));
  }

  function reset() {
    counts = { red: 0, silver: 0, gold: 0, black: 0 }; customItems = [];
    platesData.forEach(p => { document.getElementById(`qty-${p.id}`).innerText = '0'; });
    renderList(); calculate();
  }

  window.onload = () => {
    initChart();
    const sc = localStorage.getItem('sushiro_counts');
    const si = localStorage.getItem('sushiro_customItems');
    if (sc) { counts = JSON.parse(sc); platesData.forEach(p => { document.getElementById(`qty-${p.id}`).innerText = counts[p.id]; }); }
    if (si) { customItems = JSON.parse(si); renderList(); }
    calculate();
  };
</script>
</body>
</html>
